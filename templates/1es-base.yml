# 1ES Pipeline Template for Agentic Pipelines
# This template extends the 1ES Unofficial Pipeline Template and uses the Agency job type
# for the main agent task, while adding custom jobs for safe output analysis and processing.

name: {{ agent_name }}-$(BuildID)

{{ schedule }}
{{ pr_trigger }}
{{ ci_trigger }}

resources:
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/heads/main
    - repository: self
      clean: true
      submodules: true
    {{ repositories }}
  {{ pipeline_resources }}

extends:
  template: v1/1ES.Unofficial.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: {{ pool }}
      os: linux
    sdl:
      sourceAnalysisPool:
        name: AZS-1ES-W-MMS2022
        os: windows
    featureFlags:
      disableNetworkIsolation: true  # Agency requires network access for AI services
      runPrerequisitesOnImage: false # Pool image has 1ES prerequisites preinstalled
    stages:
      - stage: AgentStage
        displayName: "{{ agent_name }}"
        jobs:
          {{ setup_job }}

          # Main agentic task using the 1ES Agency job type
          - job: PerformAgenticTask
            displayName: "{{ agent_name }} (Agent)"
            {{ agentic_depends_on }}
            templateContext:
              type: agencyJob
              arguments:
                agentContextRoot: {{ agent_context_root }}
                skipSourceSync: false
                preAgentSteps:

                  {{ checkout_repositories }}

                  {{ prepare_steps }}

                  - bash: |
                      COMPILER_VERSION="{{ compiler_version }}"
                      DOWNLOAD_DIR="$(Pipeline.Workspace)/agentic-pipeline-compiler"
                      DOWNLOAD_URL="https://github.com/githubnext/ado-aw/releases/download/v${COMPILER_VERSION}/ado-aw-linux-x64"
                      CHECKSUM_URL="https://github.com/githubnext/ado-aw/releases/download/v${COMPILER_VERSION}/checksums.txt"

                      mkdir -p "$DOWNLOAD_DIR"
                      echo "Downloading ado-aw v${COMPILER_VERSION} from GitHub Releases..."
                      curl -fsSL -o "$DOWNLOAD_DIR/ado-aw-linux-x64" "$DOWNLOAD_URL"
                      curl -fsSL -o "$DOWNLOAD_DIR/checksums.txt" "$CHECKSUM_URL"

                      echo "Verifying checksum..."
                      cd "$DOWNLOAD_DIR"
                      grep "ado-aw-linux-x64" checksums.txt | sha256sum -c -
                      mv ado-aw-linux-x64 ado-aw
                      chmod +x ado-aw
                    displayName: "Download agentic pipeline compiler (v{{ compiler_version }})"

                  - bash: |
                      AGENTIC_PIPELINES_PATH="$(Pipeline.Workspace)/agentic-pipeline-compiler/ado-aw"
                      chmod +x "$AGENTIC_PIPELINES_PATH"
                      $AGENTIC_PIPELINES_PATH check "{{ pipeline_path }}"
                    displayName: "Verify pipeline integrity"

                  - bash: |
                      mkdir -p "$HOME/.copilot"
                      mkdir -p "$(Agent.TempDirectory)/staging"

                      AGENTIC_PIPELINES_PATH="$(Pipeline.Workspace)/agentic-pipeline-compiler/ado-aw"
                      chmod +x "$AGENTIC_PIPELINES_PATH"

                      # Generate MCP config for safeoutputs
                      cat > "$HOME/.copilot/mcp-config.json" << EOF
                      {
                        "mcpServers": {
                          "safeoutputs": {
                            "type": "stdio",
                            "tools": ["*"],
                            "command": "$AGENTIC_PIPELINES_PATH",
                            "args": ["mcp", "$(Agent.TempDirectory)/staging", "{{ working_directory }}"]
                          }
                        }
                      }
                      EOF

                      echo "Generated MCP config:"
                      cat "$HOME/.copilot/mcp-config.json"
                      python3 -m json.tool "$HOME/.copilot/mcp-config.json" > /dev/null && echo "JSON is valid"
                    displayName: "Configure safeoutputs MCP"

                  - bash: |
                      # Write agent instructions to a prompt file
                      cat > "$(Agent.TempDirectory)/agent-prompt.md" << 'AGENT_PROMPT_EOF'
                      {{ agent_content }}
                      AGENT_PROMPT_EOF

                      # Append safeoutputs MCP guidance
                      cat >> "$(Agent.TempDirectory)/agent-prompt.md" << 'SAFEOUTPUTS_EOF'

                      ---

                      ## Important: Safe Outputs

                      You have access to the `safeoutputs` MCP server which provides tools for creating work items and reporting issues. **Always prefer using safeoutputs tools over other methods**.

                      These tools generate safe outputs that will be reviewed and executed in a separate pipeline stage, ensuring proper validation and security controls.
                      SAFEOUTPUTS_EOF

                      echo "Agent prompt:"
                      cat "$(Agent.TempDirectory)/agent-prompt.md"
                    displayName: "Prepare agent prompt"
                postAgentSteps:
                  {{ finalize_steps }}
                globalOptions: '--log-dir $(Agency_LogPath) {{ global_options }}'
                commandOptions: '{{ agency_params }}'
                logLevel: '{{ log_level }}'
                logPath: '$(Build.StagingDirectory)/agency-logs'
                createArtifact: true
                mcpConfiguration:
                  {{ mcp_configuration }}

          # Threat analysis job (custom - not using agencyJob)
          - job: AnalyzeSafeOutputs
            displayName: "Analyze safe outputs for threats"
            dependsOn: PerformAgenticTask
            condition: succeeded()
            templateContext:
              type: buildJob
              outputs:
                - output: pipelineArtifact
                  path: $(Agent.TempDirectory)/analyzed_outputs
                  artifact: analyzed_outputs
            steps:
              {{ checkout_self }}
              {{ checkout_repositories }}

              {{ acquire_ado_token }}

              - download: current
                artifact: AgencyArtifact

              - task: NuGetAuthenticate@1
                displayName: "Authenticate NuGet Feed"

              - task: NuGetCommand@2
                displayName: "Install Copilot CLI"
                inputs:
                  command: 'custom'
                  arguments: 'install Microsoft.Copilot.CLI.linux-x64 -Source "https://pkgs.dev.azure.com/msazuresphere/_packaging/Guardian1ESPTUpstreamOrgFeed/nuget/v3/index.json" -Version {{ copilot_version }} -OutputDirectory $(Agent.TempDirectory)/tools -ExcludeVersion -NonInteractive'

              - bash: |
                  ls -la "$(Agent.TempDirectory)/tools"
                  echo "##vso[task.prependpath]$(Agent.TempDirectory)/tools/Microsoft.Copilot.CLI.linux-x64"
                displayName: Add copilot to PATH

              - bash: |
                  COMPILER_VERSION="{{ compiler_version }}"
                  DOWNLOAD_DIR="$(Pipeline.Workspace)/agentic-pipeline-compiler"
                  DOWNLOAD_URL="https://github.com/githubnext/ado-aw/releases/download/v${COMPILER_VERSION}/ado-aw-linux-x64"
                  CHECKSUM_URL="https://github.com/githubnext/ado-aw/releases/download/v${COMPILER_VERSION}/checksums.txt"

                  mkdir -p "$DOWNLOAD_DIR"
                  echo "Downloading ado-aw v${COMPILER_VERSION} from GitHub Releases..."
                  curl -fsSL -o "$DOWNLOAD_DIR/ado-aw-linux-x64" "$DOWNLOAD_URL"
                  curl -fsSL -o "$DOWNLOAD_DIR/checksums.txt" "$CHECKSUM_URL"

                  echo "Verifying checksum..."
                  cd "$DOWNLOAD_DIR"
                  grep "ado-aw-linux-x64" checksums.txt | sha256sum -c -
                  mv ado-aw-linux-x64 ado-aw
                  chmod +x ado-aw
                displayName: "Download agentic pipeline compiler (v{{ compiler_version }})"

              - bash: |
                  mkdir -p {{ working_directory }}/safe_outputs
                  # Copy safe outputs from AgencyArtifact if they exist
                  if [ -f "$(Pipeline.Workspace)/AgencyArtifact/safe_outputs.ndjson" ]; then
                    cp "$(Pipeline.Workspace)/AgencyArtifact/safe_outputs.ndjson" {{ working_directory }}/safe_outputs/
                  fi
                displayName: "Prepare safe outputs for analysis"

              - bash: |
                  # Write threat analysis prompt to a file
                  cat > "$(Agent.TempDirectory)/threat-analysis-prompt.md" << 'THREAT_ANALYSIS_EOF'
                  {{ threat_analysis_prompt }}
                  THREAT_ANALYSIS_EOF

                  echo "Threat analysis prompt:"
                  cat "$(Agent.TempDirectory)/threat-analysis-prompt.md"
                displayName: "Prepare threat analysis prompt"

              - bash: |
                  AGENTIC_PIPELINES_PATH="$(Pipeline.Workspace)/agentic-pipeline-compiler/ado-aw"
                  chmod +x "$AGENTIC_PIPELINES_PATH"

                  # Start the network proxy in background
                  $AGENTIC_PIPELINES_PATH proxy > /tmp/proxy_output.txt 2>&1 &
                  PROXY_PID=$!
                  echo $PROXY_PID > /tmp/proxy.pid

                  sleep 1
                  PROXY_PORT=$(head -n1 /tmp/proxy_output.txt)

                  if [[ -z "$PROXY_PORT" || ! "$PROXY_PORT" =~ ^[0-9]+$ ]]; then
                    echo "##vso[task.logissue type=error]Failed to start network proxy"
                    exit 1
                  fi

                  echo "Network proxy started on port $PROXY_PORT (PID: $PROXY_PID)"
                  echo "##vso[task.setvariable variable=PROXY_PORT]$PROXY_PORT"
                displayName: "Start network proxy"

              - bash: |
                  THREAT_OUTPUT_FILE="$(Agent.TempDirectory)/threat-analysis-output.txt"

                  # Use $(cat file) like gh-aw does - the command is executed directly, not via a variable
                  copilot --prompt "$(cat $(Agent.TempDirectory)/threat-analysis-prompt.md)" {{ agency_params }} > "$THREAT_OUTPUT_FILE" 2>&1
                  AGENT_EXIT_CODE=$?

                  echo "=== Threat Analysis Output (sanitized) ==="
                  sed 's/##vso\[/## [SANITIZED] vso[/g' "$THREAT_OUTPUT_FILE"
                  echo "=== End Threat Analysis Output ==="

                  exit $AGENT_EXIT_CODE
                displayName: "Run threat analysis"
                workingDirectory: {{ working_directory }}
                env:
                  {{ copilot_ado_env }}
                  GITHUB_TOKEN: $(GITHUB_TOKEN)
                  GITHUB_READ_ONLY: 1
                  HTTP_PROXY: "http://127.0.0.1:$(PROXY_PORT)"
                  HTTPS_PROXY: "http://127.0.0.1:$(PROXY_PORT)"
                  NO_PROXY: "localhost,127.0.0.1"

              - bash: |
                  if [ -f /tmp/proxy.pid ]; then
                    PROXY_PID=$(cat /tmp/proxy.pid)
                    kill $PROXY_PID 2>/dev/null || true
                    rm -f /tmp/proxy.pid
                  fi
                displayName: "Stop network proxy"
                condition: always()

              - bash: |
                  mkdir -p "$(Agent.TempDirectory)/analyzed_outputs"
                  cp -r "$(Pipeline.Workspace)/AgencyArtifact/"* "$(Agent.TempDirectory)/analyzed_outputs/" 2>/dev/null || true

                  if [ -f "$(Agent.TempDirectory)/threat-analysis-output.txt" ]; then
                    cp "$(Agent.TempDirectory)/threat-analysis-output.txt" "$(Agent.TempDirectory)/analyzed_outputs/"
                    RESULT_LINE=$(grep "THREAT_DETECTION_RESULT:" "$(Agent.TempDirectory)/threat-analysis-output.txt" | tail -1)
                    if [ -n "$RESULT_LINE" ]; then
                      JSON_CONTENT=$(echo "$RESULT_LINE" | sed 's/.*THREAT_DETECTION_RESULT://')
                      echo "$JSON_CONTENT" > "$(Agent.TempDirectory)/analyzed_outputs/threat-analysis.json"
                    fi
                  fi
                displayName: "Prepare analyzed outputs"
                condition: always()

              - bash: |
                  SAFE_TO_PROCESS="false"
                  JSON_FILE="$(Agent.TempDirectory)/analyzed_outputs/threat-analysis.json"

                  if [ -f "$JSON_FILE" ]; then
                    if jq -e . "$JSON_FILE" > /dev/null 2>&1; then
                      if jq -e '.prompt_injection or .secret_leak or .malicious_patch' "$JSON_FILE" > /dev/null 2>&1; then
                        echo "##vso[task.logissue type=warning]Threats detected - safe outputs will NOT be processed"
                      else
                        echo "No threats detected - safe outputs will be processed"
                        SAFE_TO_PROCESS="true"
                      fi
                    fi
                  fi

                  echo "##vso[task.setvariable variable=SafeToProcess;isOutput=true]$SAFE_TO_PROCESS"
                displayName: "Evaluate threat analysis"
                name: threatAnalysis
                condition: always()

          # Stage 2: Process safe outputs (custom job)
          - job: ProcessSafeOutputs
            displayName: "Process safe outputs"
            dependsOn:
              - PerformAgenticTask
              - AnalyzeSafeOutputs
            condition: and(succeeded(), eq(dependencies.AnalyzeSafeOutputs.outputs['threatAnalysis.SafeToProcess'], 'true'))
            templateContext:
              type: buildJob
              outputs:
                - output: pipelineArtifact
                  path: $(Agent.TempDirectory)/staging
                  artifact: execute_outputs
            steps:
              {{ checkout_self }}
              {{ checkout_repositories }}

              {{ acquire_write_token }}

              - download: current
                artifact: analyzed_outputs

              - bash: |
                  COMPILER_VERSION="{{ compiler_version }}"
                  DOWNLOAD_DIR="$(Pipeline.Workspace)/agentic-pipeline-compiler"
                  DOWNLOAD_URL="https://github.com/githubnext/ado-aw/releases/download/v${COMPILER_VERSION}/ado-aw-linux-x64"
                  CHECKSUM_URL="https://github.com/githubnext/ado-aw/releases/download/v${COMPILER_VERSION}/checksums.txt"

                  mkdir -p "$DOWNLOAD_DIR"
                  echo "Downloading ado-aw v${COMPILER_VERSION} from GitHub Releases..."
                  curl -fsSL -o "$DOWNLOAD_DIR/ado-aw-linux-x64" "$DOWNLOAD_URL"
                  curl -fsSL -o "$DOWNLOAD_DIR/checksums.txt" "$CHECKSUM_URL"

                  echo "Verifying checksum..."
                  cd "$DOWNLOAD_DIR"
                  grep "ado-aw-linux-x64" checksums.txt | sha256sum -c -
                  mv ado-aw-linux-x64 ado-aw
                  chmod +x ado-aw
                displayName: "Download agentic pipeline compiler (v{{ compiler_version }})"

              - bash: |
                  chmod +x "$(Pipeline.Workspace)/agentic-pipeline-compiler/ado-aw"
                  echo "##vso[task.prependpath]$(Pipeline.Workspace)/agentic-pipeline-compiler"
                displayName: Add agentic compiler to path

              - bash: ado-aw execute --source "{{ source_path }}" --safe-output-dir "$(Pipeline.Workspace)/analyzed_outputs"
                displayName: Process safe outputs
                workingDirectory: {{ working_directory }}
                env:
                  {{ executor_ado_env }}

          {{ teardown_job }}
